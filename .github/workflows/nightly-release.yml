name: nightly release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        flavor:
         - name: Standard
           gradleTask: assembleStandardRelease
           apkPath: app/build/outputs/apk/standard/release/app-standard-release.apk
         - name: Ludashi
           gradleTask: assembleLudashiRelease
           apkPath: app/build/outputs/apk/ludashi/release/app-ludashi-release.apk
         - name: PUBG
           gradleTask: assemblePubgRelease
           apkPath: app/build/outputs/apk/pubg/release/app-pubg-release.apk

    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1
        persist-credentials: false

    - name: Cache LFS
      uses: actions/cache@v5
      with:
        path: .git/lfs
        key: lfs-${{ hashFiles('**/*.txz', '**/*.tzst') }}
        restore-keys: lfs-

    - name: Pull LFS files
      run: git lfs pull

    - name: Cache NDK build outputs
      uses: actions/cache@v5
      with:
        path: |
          app/.cxx
          app/build/intermediates/cxx
        key: ndk-${{ matrix.flavor.name }}-${{ hashFiles('app/src/main/cpp/**', 'app/build.gradle', 'app/src/main/cpp/CMakeLists.txt') }}
        restore-keys: |
          ndk-${{ matrix.flavor.name }}-
          ndk-

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        validate-wrappers: true
        cache-cleanup: 'on-success'

    - name: Decode keystore and build
      timeout-minutes: 15
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GRADLE_OPTS: -Xmx4g -XX:+UseG1GC
      run: |
        export KEYSTORE_FILE="${{ github.workspace }}/release.jks"
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
        else
          export KEYSTORE_PASSWORD="dummypass"
          export KEY_ALIAS="winnative"
          export KEY_PASSWORD="dummypass"
          keytool -genkey -v \
            -keystore "$KEYSTORE_FILE" \
            -alias winnative \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass dummypass -keypass dummypass \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"
        fi
        ./gradlew :app:${{ matrix.flavor.gradleTask }} --build-cache --parallel -x lint

    - name: Rename APK for upload
      run: |
        mkdir -p artifacts
        cp ${{ matrix.flavor.apkPath }} "artifacts/WinNative-${{ matrix.flavor.name }}.apk"

    - name: Upload APK (artifact)
      uses: actions/upload-artifact@v7
      with:
        name: apk-${{ matrix.flavor.name }}
        path: artifacts/*.apk
        retention-days: 7
        archive: false
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout (for tags)
      uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts

    - name: Generate daily tag with rX
      id: version
      run: |
        DATE=$(date +'%Y-%m-%d')

        # fetch all tags
        git fetch --tags

        # count today's tags
        COUNT=$(git tag -l "${DATE}-r*" | wc -l)

        NEXT=$((COUNT + 1))
        RUN="r${NEXT}"
        TAG="${DATE}-${RUN}"

        echo "date=${DATE}" >> $GITHUB_OUTPUT
        echo "run=${RUN}" >> $GITHUB_OUTPUT
        echo "tag=${TAG}" >> $GITHUB_OUTPUT

    - name: Rename APKs with rX
      run: |
        for file in artifacts/**/*.apk; do
          base=$(basename "$file")
          flavor=$(echo "$base" | sed 's/WinNative-\(.*\)\.apk/\1/')
          mv "$file" "artifacts/WinNative-${flavor}-${{ steps.version.outputs.run }}.apk"
        done

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: WinNative Nightly Release (${{ steps.version.outputs.tag }})
        files: artifacts/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-caches:
    needs: release
    if: ${{ always() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
    - name: Cleanup duplicate caches
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh cache list --repo "$GITHUB_REPOSITORY" --json id,key,createdAt --limit 100 |
          jq -r '
            group_by(.key | sub("-[a-f0-9]{20,}$"; ""))
            | .[]
            | sort_by(.createdAt) | reverse
            | .[1:][]
            | .id
          ' |
          xargs -I {} gh cache delete {} --repo "$GITHUB_REPOSITORY" || true
